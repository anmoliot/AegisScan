services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aegisscan
      POSTGRES_USER: aegisscan
      POSTGRES_PASSWORD: local-development-only
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegisscan"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  postgres_data:
