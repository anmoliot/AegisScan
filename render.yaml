services:
  - type: web
    name: aegisscan-api
    runtime: docker
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aegisscan-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGINS
        value: https://adaptivescan-mocha.vercel.app
      - key: COOKIE_SECURE
        value: true
      - key: COOKIE_SAMESITE
        value: none
      - key: REGISTRATION_ENABLED
        value: false
databases:
  - name: aegisscan-db
    plan: free
